# =====================================================================
# Pixel-level augmentation config -- STAGE 2 of the pipeline.
#
# Run with:
#   python augmentation.py --config augmentation_config.yaml
#
# Point data.data_root at cropping.py's output_root (cropping.py must be
# run FIRST). This script no longer does any cropping, frame selection,
# or dynamic crop placement itself -- all of that already happened
# upstream. It only decides HOW the pixels in each already-cropped
# folder look: photometric adjustments, blur, noise, compression, plus
# the purely order-based `reverse` temporal augmentation and optional
# duplication.
# =====================================================================

data:
  data_root: /mnt/d/trainingData/train_10k_cropped   # cropping.py's output_root -- a folder of
                                                        # already-cropped scene folders (each one a
                                                        # single crop x sequence-length variant)
  output_root: null              # null -> defaults to "<data_root>_augmented" (sibling folder)
  overwrite: false               # false -> skip any output folder that already exists (idempotent
                                  # reruns); true -> regenerate and append to manifest.jsonl

  crop_manifest: null             # null -> defaults to "<data_root>/manifest.jsonl" (the manifest
                                  # cropping.py wrote). Used to recover each folder's true crop box +
                                  # original scene resolution, needed by lens/optics effects, and to
                                  # group folders by source_scene so lens/optics are drawn once per
                                  # real scene rather than once per folder. If missing, this script
                                  # still runs -- lens/optics effects just treat each folder as if it
                                  # IS the full original frame.

  image_extensions: [png, jpg, jpeg, bmp, tif, tiff]   # frame naming/extension is auto-discovered per
                                  # folder -- this is just the set of extensions considered a frame.

augmentation:
  seed: 1                        # governs every augmentation draw (pixel + reverse + duplication +
                                 # group choices) per folder -- reruns with the same seed against the
                                 # same data_root reproduce identical output byte-for-byte.

  # Every type below falls into exactly one of three tiers:
  #   1. lens/optics (lens_distortion, chromatic_aberration, vignetting) --
  #      drawn ONCE PER SOURCE SCENE (grouped via crop_manifest's
  #      source_scene field) and reused unchanged across every crop
  #      index AND every sequence-length variant of that scene.
  #   2. the tone/exposure group (exposure_adjustment, white_balance_shift,
  #      gamma_correction, color_jitter) -- MUTUALLY EXCLUSIVE, see
  #      `groups.tone_exposure` below: at most one of the four fires per
  #      output folder.
  #   3. everything else -- independently coin-flipped PER FOLDER.
  # A choice is always applied IDENTICALLY across every frame within one
  # folder, to keep motion between frames physically consistent -- the
  # only exceptions are gaussian_noise and jpeg_compression, which vary
  # their exact realization per frame but share one severity parameter.
  types:
    # --- geometric (synthetic -- not physical capture effects) ---
    # tier 3: independent per folder
    flip_h:
      enabled: true
      prob: 0.5
    flip_v:
      enabled: false
      prob: 0.3
    rotate90:
      enabled: false             # lens/optics types always run BEFORE rotate90 in the fixed
      prob: 0.25                 # application order, so their radial math still sees the folder in
                                 # its original orientation. Caveat: rotate90 swaps width/height, so
                                 # it only stays shape-consistent if this folder's crop is square. If
                                 # cropping.py was run with a rectangular crop_size, a folder that
                                 # gets rotated will come out as [h, w] instead -- confirm your
                                 # training loader tolerates mixed shapes, or leave this off.

    # --- lens / optics -- TIER 1: drawn ONCE PER SOURCE SCENE, not per folder ---
    # Physically a function of a folder's crop position within the
    # ORIGINAL, uncropped frame (recovered from crop_manifest). Every
    # crop index and every sequence-length variant descending from the
    # same source scene reuses this identical draw.
    lens_distortion:
      enabled: true
      prob: 0.15
      k1_range: [-0.15, 0.15]   # radial distortion coeff (barrel < 0 < pincushion). Keep modest --
                                 # larger values need pixels beyond the crop's own box, which fall
                                 # back to edge-reflection rather than true neighboring content.
      k2_range: [-0.05, 0.05]
    chromatic_aberration:
      enabled: true
      prob: 0.15
      shift_range: [0.0, 0.006] # fractional radial shift; R and B pushed in opposite directions
    vignetting:
      enabled: true
      prob: 0.2
      strength_range: [0.15, 0.45]
      falloff: 2.2

    # --- sensor/ISP + tone/color grading -- TIER 2: MUTUALLY EXCLUSIVE GROUP ---
    # At most ONE of these four fires on a given folder -- see
    # `groups.tone_exposure` below. Each `prob` here is a RELATIVE WEIGHT
    # for which single member gets picked once the group fires, not an
    # independent per-folder firing chance.
    exposure_adjustment:
      enabled: true
      prob: 0.15
      stops_range: [-0.5, 0.5]
    white_balance_shift:
      enabled: true
      prob: 0.15
      gain_range: [0.85, 1.15]
    gamma_correction:
      enabled: true
      prob: 0.2
      gamma_range: [0.7, 1.3]
    color_jitter:
      enabled: true
      prob: 0.3
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.05

    # --- optical blur ---
    # tier 3: independent per folder
    gaussian_blur:
      enabled: true
      prob: 0.15
      kernel_range: [3, 7]
      sigma_range: [0, 0]
    defocus_blur:
      enabled: true
      prob: 0.15
      radius_range: [2, 6]
    motion_blur:
      enabled: false
      prob: 0.15
      kernel_range: [5, 15]
      angle_range: [0, 360]

    # --- sensor noise ---
    gaussian_noise:
      enabled: true
      prob: 0.15
      std_range: [3, 15]

    # --- occlusion ---
    random_erasing:
      enabled: false
      prob: 0.15
      num_patches_range: [1, 1]
      area_ratio_range: [0.02, 0.08]
      aspect_ratio_range: [0.3, 3.3]
      fill: mean                # 'mean' (per-frame local mean) or 'random' (fixed noise patch)

    # --- compression (always applied last) ---
    jpeg_compression:
      enabled: true
      prob: 0.15
      quality_range: [30, 70]
    h264_compression:
      enabled: true
      prob: 0.15
      crf_range: [28, 40]
      fps: 24
      ffmpeg_path: ffmpeg       # must be resolvable on PATH; silently no-ops (writes uncompressed) if
                                 # not found, or if the encode/decode round-trip doesn't preserve
                                 # frame count

  groups:
    tone_exposure:
      prob: 0.6   # chance that ANY ONE of exposure_adjustment / white_balance_shift /
                  # gamma_correction / color_jitter fires on a given folder at all. Below this roll,
                  # none of the four fire. If it fires, exactly one is picked, weighted by that
                  # type's own `prob` above relative to other enabled members.

  # Only `reverse` remains here -- `variable_interval` was removed:
  # cropping.py's sequence-length variants now cover "vary the effective
  # duration" directly, and each of its output folders only contains
  # exactly the frames for that one variant (no extra on-disk pool to
  # stride through).
  temporal:
    reverse:
      enabled: true
      prob: 0.15

  # A folder can be duplicated into extra output copies, each drawing its
  # own independently-drawn (and checked-unique) crop-local augmentation
  # combo. Duplicates all share the same scene-level lens/optics draw as
  # their source folder; only the tone/exposure pick and tier-3 types vary.
  duplication:
    enabled: true
    prob: 0.15
    max_total_instances: 3
    max_redraw_attempts: 20